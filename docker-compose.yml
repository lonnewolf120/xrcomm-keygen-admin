version: '3.8'

services:
  xrcomm-license-admin:
    build: .
    container_name: xrcomm-license-admin
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      KEYGEN_ACCOUNT_ID: ${KEYGEN_ACCOUNT_ID}
      KEYGEN_ACCOUNT_EMAIL: ${KEYGEN_ACCOUNT_EMAIL}
      KEYGEN_ACCOUNT_PASSWORD: ${KEYGEN_ACCOUNT_PASSWORD}
      KEYGEN_BASE_URL: ${KEYGEN_BASE_URL:-http://localhost:8000}
      SITE_USER: ${SITE_USER:-admin}
      SITE_PASSWORD: ${SITE_PASSWORD:-password}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY}
      POSTMARK_FROM_EMAIL: ${POSTMARK_FROM_EMAIL}
      PADDLE_API_KEY: ${PADDLE_API_KEY}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET}
      PRODUCT_POLICY_MAPPING: ${PRODUCT_POLICY_MAPPING:-{}}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
